appId: com.repomind.app
productName: RepoMind
extraMetadata:
  description: Local Windows-first Git repository knowledge assistant with snapshot-bound evidence and traceable analysis.
  author: sail0kevin
  repository:
    type: git
    url: https://github.com/sail0kevin/Repository-Mind.git
  homepage: https://github.com/sail0kevin/Repository-Mind
directories:
  output: release
files:
  - dist-renderer/**/*
  - dist-electron/**/*
  - package.json
extraResources:
  - from: ../../backend-dist/repomind-backend.exe
    to: backend/repomind-backend.exe
  - from: ../../demo/repomind-demo
    to: demo/repomind-demo
    filter:
      # Demo 运行时只需要源码和示例数据；缓存、字节码与 Git 元数据不能进入安装包。
      - "**/*"
      - "!**/__pycache__"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/*.pyo"
      - "!**/.git"
      - "!**/.git/**"
win:
  target:
    - nsis
    - portable
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: RepoMind-${version}-${arch}-setup.${ext}
portable:
  artifactName: RepoMind-${version}-${arch}-portable.${ext}
