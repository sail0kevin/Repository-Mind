name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 75
    env:
      REPOMIND_LLM_API_KEY: ""
      REPOMIND_EMBEDDING_API_KEY: ""
      OPENAI_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip
          cache-dependency-path: backend/requirements-build.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm
          cache-dependency-path: desktop/app/package-lock.json

      - name: Install backend build dependencies
        shell: pwsh
        run: python -m pip install -r backend/requirements-build.txt

      - name: Verify tag and package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $package = Get-Content desktop/app/package.json -Raw | ConvertFrom-Json
          if ($tag -ne $package.version) { throw "Tag $tag does not match package version $($package.version)" }

      - name: Build and verify release artifacts
        shell: pwsh
        run: ./scripts/package_windows.ps1 -PythonCommand python -Release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repomind-windows-release
          path: |
            desktop/app/release/*.exe
            desktop/app/release/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/app/release/*.exe
            desktop/app/release/SHA256SUMS.txt
          fail_on_unmatched_files: true
