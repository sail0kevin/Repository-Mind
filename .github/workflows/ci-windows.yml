name: Windows CI

on:
  push:
    branches: [main, master, public-main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-build:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      REPOMIND_LLM_API_KEY: ""
      REPOMIND_EMBEDDING_API_KEY: ""
      OPENAI_API_KEY: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip
          cache-dependency-path: backend/requirements-build.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm
          cache-dependency-path: desktop/app/package-lock.json

      - name: Install backend build dependencies
        shell: pwsh
        run: python -m pip install -r backend/requirements-build.txt

      - name: Verify stable product identity
        shell: pwsh
        run: ./scripts/verify_identity_contract.ps1

      - name: Run isolated Windows package chain
        shell: pwsh
        env:
          REPOMIND_SKIP_WINDOWS_EXE_METADATA: "1"
        run: ./scripts/package_windows.ps1 -PythonCommand python

      - name: Run packaged Electron E2E
        shell: pwsh
        run: ./scripts/e2e_windows.ps1 -ExePath ./desktop/app/release/win-unpacked/RepoMind.exe

      - name: Upload redacted E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: repomind-e2e-diagnostics
          path: |
            e2e-artifacts/**/*.png
            e2e-artifacts/**/*.zip
            e2e-artifacts/**/*.webm
            e2e-artifacts/**/*.txt
            e2e-artifacts/**/*-redacted.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload unpacked package and hashes
        uses: actions/upload-artifact@v4
        with:
          name: repomind-windows-unpacked
          path: |
            desktop/app/release/win-unpacked/**
            desktop/app/release/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 7
